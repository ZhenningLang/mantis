  <rect x="28" y="32" width="72" height="52" rx="6" fill="#24283b" stroke="#565f89" stroke-width="1.5"/>
  <!-- title bar dots -->
  <circle cx="38" cy="40" r="2.5" fill="#f7768e"/>
  <circle cx="46" cy="40" r="2.5" fill="#e0af68"/>
