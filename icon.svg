    <line x1="0" y1="8" x2="0" y2="13" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="-8" y2="0" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="13" y2="0" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="-9" x2="-6" y2="-6" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="6" x2="9" y2="9" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="9" y1="-9" x2="6" y2="-6" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="6" x2="-9" y2="9" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round"/>
